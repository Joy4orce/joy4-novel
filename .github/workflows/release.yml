name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for test build (no release will be created)'
        required: false
        default: '0.0.0-dev'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -like "refs/tags/v*") {
            $v = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $v = "${{ github.event.inputs.version }}"
            if (-not $v) { $v = "0.0.0-dev" }
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Resolved version: $v"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install UPX (exe compression)
        run: choco install upx --no-progress -y

      - name: Build with PyInstaller
        run: pyinstaller Joy4_Novel.spec --noconfirm

      - name: Package portable zip
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          $zip = "Joy4_Novel_${v}_portable.zip"
          Compress-Archive -Path dist/Joy4_Novel -DestinationPath $zip -CompressionLevel Optimal
          "zip_path=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
        id: zip

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$v" installer.iss
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup failed: $LASTEXITCODE" }
          Get-ChildItem output

      - name: Upload artifacts (CI keepsake)
        uses: actions/upload-artifact@v4
        with:
          name: Joy4_Novel-${{ steps.ver.outputs.version }}
          path: |
            ${{ steps.zip.outputs.zip_path }}
            output/Joy4_Novel_Setup_*.exe
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Joy4_Novel ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ steps.zip.outputs.zip_path }}
            output/Joy4_Novel_Setup_*.exe
          fail_on_unmatched_files: true
